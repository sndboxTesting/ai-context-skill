    {
      "vars": {
        "prompt": "when was the last backup"
      },
      "assert": [
        {
          "type": "contains",
          "value": "\"intent\": \"backup_status\""
        }
      ]
    },
    {
      "vars": {
        "prompt": "https://youtu.be/dQw4w9WgXcQ"
      },
      "assert": [
        {
          "type": "contains",
          "value": "\"intent\": \"youtube\""
        }
      ]
    },
    {
      "vars": {
        "prompt": "generate an image of a sunset"
