      "assert": [
        {
          "type": "contains",
          "value": "\"intent\": \"generate_image\""
        }
      ]
    },
    {
      "vars": {
        "prompt": "check my gmail"
      },
      "assert": [
        {
          "type": "contains",
          "value": "\"intent\": \"gmail\""
        }
      ]
    },
    {
      "vars": {
        "prompt": "show unread emails"
      },
      "assert": [
        {
          "type": "contains",
          "value": "\"intent\": \"gmail\""
        }
      ]
    },
    {
      "vars": {
        "prompt": "run the nightly maintenance loop"
      },
      "assert": [
        {
          "type": "contains",
          "value": "\"intent\": \"nightly_run\""
        }
      ]
    },
    {
      "vars": {
        "prompt": "what did the nightly loop do last night"
      },
      "assert": [
        {
          "type": "contains",
          "value": "\"intent\": \"nightly_status\""
        }
      ]
    },
    {
      "vars": {
        "prompt": "listen to my voice command"
      },
      "assert": [
        {
          "type": "contains",
          "value": "\"intent\": \"voice_in\""
        }
      ]
    },
    {
      "vars": {
        "prompt": "read the morning brief out loud"
      },
      "assert": [
        {
          "type": "contains",
          "value": "\"intent\": \"voice_out\""
        }
      ]
    },
    {
      "vars": {
        "prompt": "what is the capital of France"
      },
      "assert": [
        {
          "type": "contains",
          "value": "\"intent\": \"chat\""
        }
      ]
    },
    {
      "vars": {
        "prompt": "explain how transformers work"
      },
      "assert": [
        {
          "type": "contains",
          "value": "\"intent\": \"chat\""
        }
      ]
    },
    {
      "vars": {
        "prompt": "tell me a joke"
      },
      "assert": [
        {
