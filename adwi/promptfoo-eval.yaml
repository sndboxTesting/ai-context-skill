{
  "description": "Adwi intent routing ground truth \u2014 50 cases",
  "providers": [
    {
      "id": "ollama:llama3.1:8b",
      "config": {
        "temperature": 0
      }
    }
  ],
  "prompts": [
    "Classify this message and return JSON with intent and target: {{prompt}}"
  ],
  "tests": [
    {
      "vars": {
        "prompt": "what is using my disk space"
      },
      "assert": [
        {
          "type": "contains",
          "value": "\"intent\": \"disk_usage\""
        }
      ]
    },
    {
      "vars": {
        "prompt": "show me the biggest files on my mac"
      },
      "assert": [
        {
          "type": "contains",
          "value": "\"intent\": \"large_files\""
        }
      ]
    },
    {
      "vars": {
        "prompt": "find files not accessed in a year"
      },
      "assert": [
        {
          "type": "contains",
          "value": "\"intent\": \"old_files\""
        }
      ]
    },
    {
      "vars": {
        "prompt": "are there duplicate photos in my downloads"
      },
      "assert": [
        {
          "type": "contains",
          "value": "\"intent\": \"duplicates\""
        }
      ]
    },
    {
      "vars": {
        "prompt": "how should I organize my projects folder"
      },
      "assert": [
        {
          "type": "contains",
          "value": "\"intent\": \"organize\""
        }
      ]
    },
    {
      "vars": {
        "prompt": "what can I safely delete to free space"
      },
      "assert": [
        {
          "type": "contains",
          "value": "\"intent\": \"cleanup\""
        }
      ]
    },
    {
      "vars": {
        "prompt": "read notes/profile.md"
      },
      "assert": [
        {
          "type": "contains",
          "value": "\"intent\": \"file_read\""
        }
      ]
    },
    {
      "vars": {
        "prompt": "find all python files mentioning sqlite"
      },
      "assert": [
        {
          "type": "contains",
          "value": "\"intent\": \"file_search\""
        }
      ]
    },
    {
      "vars": {
        "prompt": "list what's in my workspace adwi folder"
      },
      "assert": [
        {
          "type": "contains",
          "value": "\"intent\": \"file_list\""
        }
      ]
    },
    {
      "vars": {
        "prompt": "search the web for Ollama latest release"
      },
      "assert": [
        {
          "type": "contains",
          "value": "\"intent\": \"web_search\""
        }
      ]
    },
    {
      "vars": {
        "prompt": "search exa for LLM routing papers"
      },
      "assert": [
        {
          "type": "contains",
          "value": "\"intent\": \"exa_search\""
        }
      ]
    },
    {
      "vars": {
        "prompt": "tavily search for n8n webhooks tutorial"
      },
      "assert": [
        {
          "type": "contains",
          "value": "\"intent\": \"tavily_search\""
        }
      ]
    },
    {
      "vars": {
        "prompt": "scrape https://ollama.com/library and summarize"
      },
      "assert": [
        {
          "type": "contains",
          "value": "\"intent\": \"firecrawl\""
        }
      ]
    },
    {
      "vars": {
        "prompt": "browse https://news.ycombinator.com top stories"
      },
      "assert": [
        {
          "type": "contains",
          "value": "\"intent\": \"browse\""
        }
      ]
    },
    {
      "vars": {
        "prompt": "what do you remember about my AI setup"
      },
      "assert": [
        {
          "type": "contains",
          "value": "\"intent\": \"memory_recall\""
        }
      ]
    },
    {
      "vars": {
        "prompt": "scan and update your memory from my notes"
      },
      "assert": [
        {
          "type": "contains",
          "value": "\"intent\": \"memory_scan\""
        }
      ]
    },
    {
      "vars": {
        "prompt": "how many memories do you have"
      },
      "assert": [
        {
          "type": "contains",
          "value": "\"intent\": \"memory_stats\""
        }
      ]
    },
    {
      "vars": {
        "prompt": "search my obsidian vault for automation notes"
      },
      "assert": [
        {
          "type": "contains",
          "value": "\"intent\": \"obsidian_search\""
        }
      ]
    },
    {
      "vars": {
        "prompt": "read my obsidian daily note"
      },
      "assert": [
        {
          "type": "contains",
          "value": "\"intent\": \"obsidian_daily\""
        }
      ]
    },
    {
      "vars": {
        "prompt": "are all my services running"
      },
      "assert": [
        {
          "type": "contains",
          "value": "\"intent\": \"status\""
        }
      ]
    },
    {
      "vars": {
        "prompt": "fix adwi it's broken"
