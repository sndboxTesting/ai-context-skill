          "value": "\"intent\": \"chat\""
        }
      ]
    },
    {
      "vars": {
        "prompt": "who wrote hamlet"
      },
      "assert": [
        {
          "type": "contains",
          "value": "\"intent\": \"chat\""
        }
      ]
    },
    {
      "vars": {
        "prompt": "translate hello to spanish"
      },
      "assert": [
        {
          "type": "contains",
          "value": "\"intent\": \"chat\""
        }
      ]
    },
    {
      "vars": {
        "prompt": "what is 2 plus 2"
