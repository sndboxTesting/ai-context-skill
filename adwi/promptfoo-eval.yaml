      "assert": [
        {
          "type": "contains",
          "value": "\"intent\": \"what_next\""
        }
      ]
    },
    {
      "vars": {
        "prompt": "run the daily improvement routine"
      },
      "assert": [
        {
          "type": "contains",
          "value": "\"intent\": \"daily_improve\""
        }
      ]
    },
    {
      "vars": {
        "prompt": "how fast is adwi in tokens per second"
      },
      "assert": [
        {
          "type": "contains",
          "value": "\"intent\": \"benchmark\""
        }
      ]
    },
    {
      "vars": {
        "prompt": "run a quick python script to check disk"
      },
      "assert": [
        {
          "type": "contains",
          "value": "\"intent\": \"run_code\""
        }
      ]
    },
    {
      "vars": {
        "prompt": "check adwi's full health"
