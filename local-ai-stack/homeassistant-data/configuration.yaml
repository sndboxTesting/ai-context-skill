
# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

lovelace:
  mode: yaml

# REST commands — called by dashboard buttons → n8n webhooks → adwi
rest_command:
  adwi_backup:
    url: "http://100.110.47.128:5678/webhook/adwi-backup"
    method: POST
    content_type: "application/json"
    payload: '{"command": "backup"}'
  adwi_nightly:
    url: "http://100.110.47.128:5678/webhook/adwi-nightly"
    method: POST
    content_type: "application/json"
    payload: '{"command": "nightly"}'
  adwi_brief:
    url: "http://100.110.47.128:5678/webhook/adwi-brief"
    method: POST
    content_type: "application/json"
    payload: '{"command": "brief"}'

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
